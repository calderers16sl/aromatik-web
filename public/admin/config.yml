backend:
  name: github
  repo: calderers16sl/aromatik-web
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

locale: 'es'

collections:
  - name: "apartments"
    label: "Apartamentos"
    folder: "src/content/apartments"
    create: false
    slug: "{{slug}}"
    fields:
      - { label: "Nombre", name: "title", widget: "string" }
      - { label: "Slug URL", name: "slug", widget: "string" }
      - { label: "ID Smoobu", name: "smoobu_id", widget: "number" }
      - { label: "Orden", name: "order", widget: "number" }
      - { label: "Imagen principal", name: "hero_image", widget: "image" }
      - label: "Galería"
        name: "gallery"
        widget: "list"
        fields:
          - { label: "Imagen", name: "image", widget: "image" }
          - { label: "Descripción", name: "alt", widget: "string" }
      - label: "Capacidad"
        name: "specs"
        widget: "object"
        fields:
          - { label: "Huéspedes", name: "guests", widget: "number" }
          - { label: "Habitaciones", name: "bedrooms", widget: "number" }
          - { label: "Baños", name: "bathrooms", widget: "number" }
          - { label: "Metros cuadrados", name: "size_m2", widget: "number" }
      - { label: "Descripción (ES)", name: "description_es", widget: "markdown" }
      - { label: "Descripción (EN)", name: "description_en", widget: "markdown", required: false }
      - { label: "Descripción (CA)", name: "description_ca", widget: "markdown", required: false }
      - { label: "Descripción (FR)", name: "description_fr", widget: "markdown", required: false }
      - { label: "Descripción (DE)", name: "description_de", widget: "markdown", required: false }

  - name: "pages"
    label: "Páginas"
    folder: "src/content/pages"
    create: false
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Contenido", name: "body", widget: "markdown" }
